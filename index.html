<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>иҚүиҚүжҠ•иіҮеһӢе®ўжҲ¶з®ЎзҗҶзі»зөұ</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Noto+Serif+TC:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d0f;--surface:#141416;--surface2:#1c1c1f;--surface3:#242428;
  --border:#2a2a2e;--gold:#c9a84c;--gold-light:#e8c97a;--gold-dim:rgba(201,168,76,.15);
  --text:#e8e6e1;--text-dim:#8a8880;--text-muted:#4a4a50;
  --green:#4caf7a;--red:#e05c5c;--blue:#5c9ae0;
  --radius:10px;--radius-sm:6px;
  --shadow:0 4px 24px rgba(0,0,0,.4);--shadow-gold:0 0 30px rgba(201,168,76,.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif TC',serif;min-height:100vh;
  background-image:radial-gradient(ellipse at 20% 0%,rgba(201,168,76,.04) 0%,transparent 60%),
  radial-gradient(ellipse at 80% 100%,rgba(92,154,224,.03) 0%,transparent 60%);}
.header{border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;
  justify-content:space-between;background:rgba(13,13,15,.97);backdrop-filter:blur(10px);
  position:sticky;top:0;z-index:100;}
.header-brand{display:flex;align-items:center;gap:12px;}
.header-icon{width:34px;height:34px;border:1px solid var(--gold);border-radius:6px;
  display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:14px;font-weight:bold;}
.header-title{font-family:'Playfair Display',serif;font-size:17px;color:var(--gold-light);letter-spacing:.3px;}
.header-sub{font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:1px;margin-top:1px;}
.btn-gold{background:var(--gold);color:#0d0d0f;border:none;padding:8px 18px;border-radius:var(--radius-sm);
  font-family:'Noto Serif TC',serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;
  display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
.btn-gold:hover{background:var(--gold-light);transform:translateY(-1px);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text-muted);display:inline-block;margin-right:4px;transition:background .3s;}
.sync-dot.syncing{background:var(--gold);animation:pulse .8s infinite;}
.sync-dot.ok{background:var(--green);}
.sync-dot.err{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.main-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);
  position:sticky;top:67px;z-index:90;}
.main-tab{padding:13px 24px;font-size:13px;color:var(--text-muted);cursor:pointer;
  border-bottom:2px solid transparent;transition:all .2s;font-family:'Noto Serif TC',serif;
  display:flex;align-items:center;gap:8px;white-space:nowrap;}
.main-tab:hover{color:var(--text-dim);}
.main-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.tab-count{background:var(--surface3);border:1px solid var(--border);border-radius:10px;
  padding:1px 7px;font-size:10px;font-family:'DM Mono',monospace;}
.main-tab.active .tab-count{background:var(--gold-dim);border-color:rgba(201,168,76,.3);color:var(--gold);}
.main{padding:22px 32px;max-width:1600px;margin:0 auto;}
.stats-bar{display:grid;gap:12px;margin-bottom:22px;}
.stats-bar-3{grid-template-columns:repeat(3,1fr);}
.stats-bar-4{grid-template-columns:repeat(4,1fr);}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 18px;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--gold),transparent);opacity:.5;}
.stat-label{font-size:10px;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;font-family:'DM Mono',monospace;}
.stat-value-row{display:flex;align-items:baseline;gap:5px;margin-top:3px;}
.stat-value{font-size:20px;color:var(--gold-light);font-family:'Playfair Display',serif;}
.stat-sub-inline{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.section-title{font-family:'Playfair Display',serif;font-size:15px;color:var(--text);
  display:flex;align-items:center;gap:8px;}
.section-title::before{content:'';width:3px;height:16px;background:var(--gold);border-radius:2px;}
.search-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:7px 13px;color:var(--text);font-family:'Noto Serif TC',serif;font-size:13px;
  width:200px;outline:none;transition:border-color .2s;}
.search-box:focus{border-color:var(--gold);}
.search-box::placeholder{color:var(--text-muted);}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;box-shadow:var(--shadow);}
table{width:100%;border-collapse:collapse;}
thead tr{background:var(--surface2);border-bottom:1px solid var(--border);}
th{padding:10px 13px;font-size:10px;font-family:'DM Mono',monospace;letter-spacing:1px;
  color:var(--text-muted);text-align:left;font-weight:400;text-transform:uppercase;white-space:nowrap;
  cursor:pointer;user-select:none;transition:color .15s;}
th:hover{color:var(--text-dim);}
th.sorted-asc,th.sorted-desc{color:var(--gold);}
th .sort-icon{margin-left:4px;opacity:.5;font-size:9px;}
th.sorted-asc .sort-icon,th.sorted-desc .sort-icon{opacity:1;}
tbody tr{border-bottom:1px solid rgba(42,42,46,.5);transition:background .15s;cursor:pointer;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:rgba(201,168,76,.04);}
td{padding:12px 13px;font-size:13px;vertical-align:middle;}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;
  font-family:'DM Mono',monospace;letter-spacing:.5px;white-space:nowrap;}
.tag-monthly{background:rgba(201,168,76,.12);color:var(--gold);border:1px solid rgba(201,168,76,.2);}
.tag-regular{background:rgba(92,154,224,.12);color:var(--blue);border:1px solid rgba(92,154,224,.2);}
.tag-savings{background:rgba(76,175,122,.1);color:var(--green);border:1px solid rgba(76,175,122,.25);}
.tag-company{background:var(--surface3);color:var(--text-dim);border:1px solid var(--border);}
.tag-usd{background:rgba(76,175,122,.1);color:var(--green);border:1px solid rgba(76,175,122,.25);}
.tag-twd{background:rgba(201,168,76,.1);color:var(--gold);border:1px solid rgba(201,168,76,.2);}
.tag-paused{background:rgba(224,92,92,.1);color:var(--red);border:1px solid rgba(224,92,92,.2);}
.amount{font-family:'DM Mono',monospace;}
.pct-pos{color:var(--green);}
.pct-neg{color:var(--red);}
.pct-neu{color:var(--text-dim);}
.action-btns{display:flex;gap:5px;}
.btn-sm{padding:4px 10px;border-radius:var(--radius-sm);font-size:11px;cursor:pointer;
  border:1px solid;font-family:'DM Mono',monospace;transition:all .15s;white-space:nowrap;}
.btn-view{background:transparent;border-color:var(--gold);color:var(--gold);}
.btn-view:hover{background:var(--gold-dim);}
.btn-edit{background:transparent;border-color:var(--border);color:var(--text-dim);}
.btn-edit:hover{border-color:var(--text-dim);color:var(--text);}
.btn-del{background:transparent;border-color:transparent;color:var(--text-muted);}
.btn-del:hover{color:var(--red);border-color:rgba(224,92,92,.3);}
.btn-secondary{background:transparent;color:var(--text-dim);border:1px solid var(--border);
  padding:8px 20px;border-radius:var(--radius-sm);font-family:'Noto Serif TC',serif;
  font-size:13px;cursor:pointer;transition:all .2s;}
.btn-secondary:hover{border-color:var(--text-dim);color:var(--text);}
.btn-outline{background:transparent;border:1px solid var(--gold);color:var(--gold);
  padding:7px 14px;border-radius:var(--radius-sm);font-family:'Noto Serif TC',serif;
  font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.btn-outline:hover{background:var(--gold-dim);}
.btn-back{background:transparent;border:1px solid var(--border);color:var(--text-dim);
  padding:6px 13px;border-radius:var(--radius-sm);font-family:'DM Mono',monospace;
  font-size:11px;cursor:pointer;letter-spacing:.5px;transition:all .2s;
  display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
.btn-back:hover{border-color:var(--text-dim);color:var(--text);}
.breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:18px;
  font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.5px;}
.breadcrumb span{cursor:pointer;}
.breadcrumb span:hover{color:var(--gold);}
.breadcrumb .sep,.breadcrumb .current{cursor:default;}
.breadcrumb .current{color:var(--text-dim);}
.detail-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:22px 26px;margin-bottom:18px;box-shadow:var(--shadow-gold);}
.detail-top{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:20px;align-items:stretch;}
.detail-name{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold-light);}
.detail-col1{display:flex;gap:18px;align-items:flex-start;}
.detail-col1-info{display:flex;flex-direction:column;gap:8px;padding-top:4px;}
.ds{padding:14px 18px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);
  display:flex;flex-direction:column;justify-content:center;}
.ds-label{font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:1.2px;
  text-transform:uppercase;margin-bottom:6px;}
.ds-val{font-size:22px;color:var(--text);font-family:'Playfair Display',serif;line-height:1.2;}
.ds-val.gold{color:var(--gold-light);}
.ds-val.green{color:var(--green);}
.targets-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:12px 18px;margin-bottom:18px;display:flex;align-items:center;gap:18px;}
.targets-box-title{font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;
  letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap;flex-shrink:0;}
.targets-chips{display:flex;flex-wrap:wrap;gap:7px;flex:1;}
.target-chip{background:var(--surface3);border:1px solid var(--border);border-radius:6px;
  padding:6px 12px;font-size:14px;font-family:'DM Mono',monospace;color:var(--text-dim);
  display:flex;gap:8px;align-items:center;}
.target-chip .cash{color:var(--green);}
.target-chip .unit{color:var(--blue);}
.target-chip .pct-num{color:var(--gold);}
.timeline-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.timeline-head{padding:12px 20px;border-bottom:1px solid var(--border);background:var(--surface2);
  display:flex;align-items:center;justify-content:space-between;}
.timeline-title{font-size:11px;font-family:'DM Mono',monospace;letter-spacing:1px;color:var(--text-dim);}
.record-row{padding:14px 20px;border-bottom:1px solid rgba(42,42,46,.5);transition:background .15s;}
.record-row:last-child{border-bottom:none;}
.record-row:hover{background:rgba(201,168,76,.03);}
.rec-grid-monthly{display:grid;grid-template-columns:150px 1fr 1fr 1fr auto;gap:16px;align-items:start;}
.rec-grid-regular{display:grid;grid-template-columns:150px 1fr 1fr 1fr 1fr auto;gap:16px;align-items:start;}
.rec-date{font-family:'DM Mono',monospace;font-size:13px;color:var(--gold);}
.rec-label{font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;
  letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.rec-val{font-size:14px;color:var(--text);}
.rec-sub{font-size:11px;margin-top:3px;}
.empty-state{text-align:center;padding:50px 20px;color:var(--text-muted);}
.empty-icon{font-size:34px;margin-bottom:10px;opacity:.3;}
.empty-text{font-size:13px;}
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:999;gap:16px;}
.loading-logo{font-family:'Playfair Display',serif;font-size:48px;color:var(--gold);opacity:.8;}
.loading-text{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:2px;}
.loading-bar{width:200px;height:2px;background:var(--border);border-radius:1px;overflow:hidden;}
.loading-bar-inner{height:100%;background:var(--gold);border-radius:1px;animation:loadbar 1.5s ease-in-out infinite;}
@keyframes loadbar{0%{width:0;margin-left:0;}50%{width:60%;margin-left:20%;}100%{width:0;margin-left:100%;}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.77);backdrop-filter:blur(4px);
  z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;
  width:100%;max-width:660px;max-height:92vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.6),var(--shadow-gold);animation:mIn .2s ease;}
@keyframes mIn{from{opacity:0;transform:scale(.96) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-header{padding:18px 24px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Playfair Display',serif;font-size:17px;color:var(--gold-light);}
.modal-close{background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;transition:color .15s;}
.modal-close:hover{color:var(--text);}
.modal-body{padding:18px 24px;}
.modal-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}
.fsec{margin-bottom:18px;}
.fsec-title{font-size:10px;font-family:'DM Mono',monospace;letter-spacing:2px;color:var(--gold);
  text-transform:uppercase;margin-bottom:11px;padding-bottom:7px;border-bottom:1px solid rgba(201,168,76,.15);}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.ffull{grid-column:1/-1;}
.fgroup{display:flex;flex-direction:column;gap:5px;}
.flabel{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;letter-spacing:.5px;}
.finput,.fselect,.ftextarea{background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:8px 11px;color:var(--text);font-family:'Noto Serif TC',serif;
  font-size:13px;outline:none;transition:border-color .2s;width:100%;}
.finput:focus,.fselect:focus,.ftextarea:focus{border-color:var(--gold);}
.fselect option{background:var(--surface2);}
.finput::placeholder{color:var(--text-muted);}
.ftextarea{resize:vertical;min-height:56px;}
.type-tabs{display:flex;gap:8px;margin-bottom:4px;}
.type-tab{flex:1;padding:9px;text-align:center;border:1px solid var(--border);border-radius:var(--radius-sm);
  cursor:pointer;font-size:12px;transition:all .2s;color:var(--text-dim);background:var(--surface2);}
.type-tab.active.monthly{border-color:var(--gold);color:var(--gold);background:var(--gold-dim);}
.type-tab.active.regular{border-color:var(--blue);color:var(--blue);background:rgba(92,154,224,.1);}
.trow{display:grid;gap:8px;align-items:center;margin-bottom:8px;}
.trow-monthly{grid-template-columns:1fr 70px 70px 52px 28px;}
.trow-regular{grid-template-columns:1fr 70px 28px;}
.trow-sum{text-align:center;font-family:'DM Mono',monospace;font-size:12px;color:var(--text-muted);}
.trow-sum.ok{color:var(--green);}
.trow-sum.over{color:var(--red);}
.btn-icon{width:28px;height:28px;border-radius:5px;border:1px solid var(--border);background:transparent;
  color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:14px;transition:all .15s;}
.btn-icon:hover{border-color:var(--red);color:var(--red);}
.btn-icon.add{border-color:rgba(201,168,76,.3);color:var(--gold);}
.btn-icon.add:hover{background:var(--gold-dim);border-color:var(--gold);}
.checkbox-row{display:flex;align-items:center;gap:8px;cursor:pointer;}
.checkbox-row input[type=checkbox]{width:15px;height:15px;accent-color:var(--gold);cursor:pointer;}
.checkbox-label{font-size:13px;color:var(--text-dim);}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted);}
@media(max-width:1100px){
  .detail-top{grid-template-columns:1fr 1fr;}
  .rec-grid-monthly,.rec-grid-regular{grid-template-columns:1fr 1fr 1fr;}
}
@media(max-width:768px){
  .main{padding:14px;}.header{padding:13px 16px;}
  .stats-bar-3,.stats-bar-4{grid-template-columns:1fr 1fr;}
  .detail-top{grid-template-columns:1fr;}.fgrid{grid-template-columns:1fr;}
}
</style>
</head>

// в”Җв”Җв”Җ FIREBASE SYNC в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function setSyncStatus(status){
  var dot=document.getElementById('sync-dot');
  if(!dot)return;
  dot.className='sync-dot '+status;
}
function saveDB(){
  setSyncStatus('syncing');
  db.lastEdited=new Date().toISOString();
  set(dbRef, db).then(function(){
    setSyncStatus('ok');
    updateLastEdited();
    setTimeout(function(){setSyncStatus('ok');},2000);
  }).catch(function(err){
    setSyncStatus('err');
    console.error('Firebase save error:',err);
  });
}
function updateLastEdited(){
  var el=document.getElementById('last-edited');
  if(!el||!db.lastEdited){if(el)el.textContent='вҖ”';return;}
  var d=new Date(db.lastEdited);
  var pad=function(n){return n<10?'0'+n:String(n);};
  el.textContent=d.getFullYear()+'/'+pad(d.getMonth()+1)+'/'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes());
}

// в”Җв”Җв”Җ INIT: listen to Firebase в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
onValue(dbRef, function(snapshot){
  var data=snapshot.val();
  if(data){
    db=data;
    if(!db.clients)db.clients=[];
    if(!db.savings)db.savings=[];
  } else {
    // First time: write demo data
    db=JSON.parse(JSON.stringify(DEMO));
    set(dbRef, db);
  }
  if(!fbLoaded){
    fbLoaded=true;
    document.getElementById('loading-screen').style.display='none';
    setSyncStatus('ok');
    switchTab('all');
    updateLastEdited();
  } else {
    // Real-time update from another device
    render();
    updateTabCounts();
    updateLastEdited();
  }
}, function(error){
  console.error('Firebase read error:', error);
  setSyncStatus('err');
  // Fallback to demo data if Firebase fails
  if(!fbLoaded){
    fbLoaded=true;
    db=JSON.parse(JSON.stringify(DEMO));
    document.getElementById('loading-screen').style.display='none';
    switchTab('all');
  }
});

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function fmtN(n,cur){
  var num=parseFloat(n);
  if(isNaN(num))return'вҖ”';
  var s=new Intl.NumberFormat('zh-TW',{maximumFractionDigits:0}).format(Math.abs(num));
  var prefix=cur==='зҫҺйҮ‘'?'USD ':cur==='еҸ°е№Ј'?'NT$':'$';
  return(num<0?'-':'')+prefix+s;
}
function fmtM(n){
  var num=parseFloat(n)||0;
  if(num>=1e8)return(num/1e8).toFixed(1)+'е„„';
  if(num>=1e4)return(num/1e4).toFixed(1)+'иҗ¬';
  return String(Math.round(num));
}
function calcPct(cur,base){
  var c=parseFloat(cur)||0,b=parseFloat(base)||0;
  if(!b)return null;
  return(c-b)/b*100;
}
function pctSpan(pct){
  if(pct===null)return'<span style="color:var(--text-muted)">вҖ”</span>';
  var cls=pct>0?'pct-pos':pct<0?'pct-neg':'pct-neu';
  var arrow=pct>0?'в–І ':pct<0?'в–ј ':'';
  return'<span class="'+cls+'">'+arrow+(pct>0?'+':'')+pct.toFixed(2)+'%</span>';
}
function thSort(col,label){
  var sc=sortCol===col?'sorted-'+(sortDir===1?'asc':'desc'):'';
  var arrow=sortCol===col?(sortDir===1?' вҶ‘':' вҶ“'):' вҶ•';
  return'<th class="'+sc+'" onclick="doSort(\''+col+'\')">'+label+'<span class="sort-icon">'+arrow+'</span></th>';
}
function sCard(label,val,sub){
  return'<div class="stat-card"><div class="stat-label">'+label+'</div>'
    +'<div class="stat-value-row"><span class="stat-value">'+val+'</span>'
    +'<span class="stat-sub-inline">'+sub+'</span></div></div>';
}
function calcPolicyYear(signDate){
  if(!signDate)return null;
  var sign=new Date(signDate),now=new Date();
  // иЁҲз®—е№ҙд»Ҫе·®
  var years=now.getFullYear()-sign.getFullYear();
  // д»Ҡе№ҙзҡ„йҖұе№ҙж—Ҙ
  var anniversary=new Date(now.getFullYear(),sign.getMonth(),sign.getDate());
  // еҰӮжһңд»ҠеӨ©йӮ„жІ’еҲ°йҒ”йҖұе№ҙж—ҘпјҢе№ҙеәҰж•ёиҰҒе°‘дёҖе№ҙ
  if(now<anniversary)years--;
  if(years<0)years=0;
  return years+1; // з¬¬1е№ҙиө·з®—
}
function calcCumPremium(signDate,premium,payFreq){
  if(!signDate||!premium)return 0;
  var sign=new Date(signDate);
  var now=new Date();
  var p=parseFloat(premium)||0;
  if(payFreq==='жңҲз№і'){
    var months=(now.getFullYear()-sign.getFullYear())*12+(now.getMonth()-sign.getMonth())+1;
    if(months<1)months=1;
    return p*months;
  } else if(payFreq==='иәүз№і'){
    return p; // дёҖж¬Ўз№іжё…
  } else {
    var py=calcPolicyYear(signDate);
    return p*(py||1);
  }
}

function sortClients(arr){
  if(!sortCol)return arr;
  return arr.slice().sort(function(a,b){
    var av,bv;
    if(sortCol==='name'){av=a.name;bv=b.name;}
    else if(sortCol==='company'){av=a.company;bv=b.company;}
    else if(sortCol==='product'){av=a.productName||'';bv=b.productName||'';}
    else if(sortCol==='currency'){av=a.currency;bv=b.currency;}
    else if(sortCol==='signDate'){av=a.signDate||'';bv=b.signDate||'';}
    else if(sortCol==='entryP'){av=parseFloat(a.entryPrincipal)||0;bv=parseFloat(b.entryPrincipal)||0;}
    else if(sortCol==='tp'){av=parseFloat(a.targetPremium)||0;bv=parseFloat(b.targetPremium)||0;}
    else if(sortCol==='latestP'){
      var la=a.records&&a.records.length?a.records[a.records.length-1]:null;
      var lb=b.records&&b.records.length?b.records[b.records.length-1]:null;
      av=la?parseFloat(la.principal)||0:0;bv=lb?parseFloat(lb.principal)||0:0;
    }
    else if(sortCol==='pct'){
      var la=a.records&&a.records.length?a.records[a.records.length-1]:null;
      var lb=b.records&&b.records.length?b.records[b.records.length-1]:null;
      var ba=a.type==='monthly'?parseFloat(a.entryPrincipal)||0:(la?parseFloat(la.cumPaid)||0:0);
      var bb=b.type==='monthly'?parseFloat(b.entryPrincipal)||0:(lb?parseFloat(lb.cumPaid)||0:0);
      av=la?calcPct(la.principal,ba)||0:0;bv=lb?calcPct(lb.principal,bb)||0:0;
    }
    else if(sortCol==='cumInt'){
      var la=a.records&&a.records.length?a.records[a.records.length-1]:null;
      var lb=b.records&&b.records.length?b.records[b.records.length-1]:null;
      av=la?parseFloat(la.cumInterest)||0:0;bv=lb?parseFloat(lb.cumInterest)||0:0;
    }
    else if(sortCol==='cumPaid'){
      var la=a.records&&a.records.length?a.records[a.records.length-1]:null;
      var lb=b.records&&b.records.length?b.records[b.records.length-1]:null;
      av=la?parseFloat(la.cumPaid)||0:0;bv=lb?parseFloat(lb.cumPaid)||0:0;
    }
    else{av='';bv='';}
    if(typeof av==='string')return av.localeCompare(bv)*sortDir;
    return(av-bv)*sortDir;
  });
}

}

function buildAllRow(c){
  var last=c.records&&c.records.length?c.records[c.records.length-1]:null;
  var isM=c.type==='monthly';
  var latestP=last?parseFloat(last.principal)||0:0;

function sortSavings(arr){
  if(!sortCol)return arr;
  return arr.slice().sort(function(a,b){
    var av,bv;
    if(sortCol==='sv-name'){av=a.name;bv=b.name;}
    else if(sortCol==='sv-company'){av=a.company;bv=b.company;}
    else if(sortCol==='sv-product'){av=a.productName||'';bv=b.productName||'';}
    else if(sortCol==='sv-currency'){av=a.currency;bv=b.currency;}
    else if(sortCol==='sv-signDate'){av=a.signDate||'';bv=b.signDate||'';}
    else if(sortCol==='sv-years'){av=parseFloat(a.policyYears)||0;bv=parseFloat(b.policyYears)||0;}
    else if(sortCol==='sv-premium'){av=parseFloat(a.premium)||0;bv=parseFloat(b.premium)||0;}
    else if(sortCol==='sv-pyear'){av=calcPolicyYear(a.signDate)||0;bv=calcPolicyYear(b.signDate)||0;}
    else if(sortCol==='sv-cum'){av=calcCumPremium(a.signDate,a.premium,a.payFreq);bv=calcCumPremium(b.signDate,b.premium,b.payFreq);}
    else{av='';bv='';}
    if(typeof av==='string')return av.localeCompare(bv)*sortDir;
    return(av-bv)*sortDir;
  });
}
function thSortSv(col,label){
  var sc=sortCol===col?'sorted-'+(sortDir===1?'asc':'desc'):'';
  var arrow=sortCol===col?(sortDir===1?' вҶ‘':' вҶ“'):' вҶ•';
  return'<th class="'+sc+'" onclick="doSortSv(\''+col+'\')">'+label+'<span class="sort-icon">'+arrow+'</span></th>';
}
function doSortSv(col){
  if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=1;}
  renderSavingsList();
}

function filterList(q){
  if(currentTab==='savings'){
    var f=(db.savings||[]).filter(function(s){return s.name.includes(q)||s.company.includes(q)||(s.productName||'').includes(q);});
    document.getElementById('list-tbody').innerHTML=f.map(buildSavingsRow).join('');return;
  }
  var pool=currentTab==='all'?db.clients:db.clients.filter(function(c){return c.type===currentTab;});
  var f=pool.filter(function(c){return c.name.includes(q)||(c.productName||'').includes(q)||c.company.includes(q);});
  var builder=currentTab==='all'?buildAllRow:currentTab==='monthly'?buildMonthlyRow:buildRegularRow;
  document.getElementById('list-tbody').innerHTML=sortClients(f).map(builder).join('');
}
window.filterList=filterList;

function renderMonthlyDetail(c){
  var records=c.records||[];
  var initP=parseFloat(c.entryPrincipal)||0;
  var last=records.length?records[records.length-1]:null;
  var latestP=last?parseFloat(last.principal)||0:0;
  var cumInt=last?parseFloat(last.cumInterest)||0:0;
  var pct=last?calcPct(latestP,initP):null;
  var pctClass=pct===null?'':pct>=0?'pct-pos':'pct-neg';
  var pctText=pct===null?'вҖ”':(pct>=0?'в–І +':'в–ј ')+Math.abs(pct).toFixed(2)+'%';

function openClientModal(id){
  var c=id?db.clients.find(function(x){return x.id===id;}):null;
  if(c){mType=c.type;}
  else{mType=(currentTab==='monthly'||currentTab==='regular')?currentTab:'monthly';}
  mTargets=c&&c.targets?JSON.parse(JSON.stringify(c.targets))
    :(mType==='monthly'?[{name:'',cashPct:'',unitPct:''}]:[{name:'',pct:''}]);
  document.getElementById('modal-overlay').style.display='flex';
  renderClientModal(c);
}
window.openClientModal=openClientModal;

  var isEdit=!!c;
  var pOpts=PRODUCTS.map(function(p){return'<option'+(c&&c.productName===p?' selected':'')+'>'+p+'</option>';}).join('');
  var coOpts=COMPANIES.map(function(co){return'<option'+(c&&c.company===co?' selected':'')+'>'+co+'</option>';}).join('');
  var curOpts=CURRENCIES.map(function(cu){return'<option'+(c&&c.currency===cu?' selected':'')+'>'+cu+'</option>';}).join('');
  var extraFields='';
  if(mType==='monthly'){
    extraFields='<div class="fgroup"><label class="flabel">йҖІе ҙжң¬йҮ‘ *</label><input class="finput" id="f-ep" type="number" placeholder="0" value="'+(c&&c.entryPrincipal?c.entryPrincipal:'')+'"></div>';
  } else {
    extraFields='<div class="fgroup"><label class="flabel">зӣ®жЁҷдҝқиІ»пјҲжҜҸжңҹпјү*</label><input class="finput" id="f-tp" type="number" placeholder="0" value="'+(c&&c.targetPremium?c.targetPremium:'')+'"></div>'
      +'<div class="fgroup"><label class="flabel">з№іиІ»й »зҺҮ</label><select class="fselect" id="f-payFreq"><option'+(c&&c.payFreq==='жңҲз№і'?' selected':!c||!c.payFreq?' selected':'')+'>жңҲз№і</option><option'+(c&&c.payFreq==='е№ҙз№і'?' selected':'')+'>е№ҙз№і</option></select></div>'
      +'<div class="fgroup ffull"><label class="checkbox-row"><input type="checkbox" id="f-paused"'+(c&&c.isPaused?' checked':'')+'><span class="checkbox-label">зӣ®еүҚз·©з№ідёӯ</span></label></div>';
  }
  var tgHeader=mType==='monthly'
    ?'<div style="font-size:10px;font-family:\'DM Mono\',monospace;color:var(--text-muted);margin-bottom:8px">жҜҸеҖӢжЁҷзҡ„еЎ«еҜ«еҗҚзЁұеҸҠзҸҫйҮ‘/иІ·еӣһжҜ”дҫӢпјҲеҗ„жЁҷзҡ„зҸҫйҮ‘+иІ·еӣһжҮүеҗ„зӮә100%пјү</div>'
    :'<div style="font-size:10px;font-family:\'DM Mono\',monospace;color:var(--text-muted);margin-bottom:8px">еЎ«еҜ«жЁҷзҡ„еҗҚзЁұеҸҠй…ҚзҪ®жҜ”дҫӢпјҲжүҖжңүжЁҷзҡ„еҗҲиЁҲжҮүзӮә100%пјү</div>';
  document.getElementById('modal-box').innerHTML=
    '<div class="modal-header"><div class="modal-title">'+(isEdit?'з·ЁијҜе®ўжҲ¶':'ж–°еўһе®ўжҲ¶')+'</div><button class="modal-close" onclick="closeModal()">Г—</button></div>'
    +'<div class="modal-body">'
    +'<div class="fsec"><div class="fsec-title">е•Ҷе“ҒйЎһеһӢ</div><div class="type-tabs">'
    +'<div class="type-tab monthly'+(mType==='monthly'?' active':'')+'" onclick="switchMType(\'monthly\')">в—Ҳ жңҲй…ҚжҒҜдҝқе–®</div>'
    +'<div class="type-tab regular'+(mType==='regular'?' active':'')+'" onclick="switchMType(\'regular\')">в—Ҳ е®ҡжңҹе®ҡйЎҚ</div>'
    +'</div></div>'
    +'<div class="fsec"><div class="fsec-title">еҹәжң¬иіҮж–ҷ</div><div class="fgrid">'
    +'<div class="fgroup"><label class="flabel">е®ўжҲ¶е§“еҗҚ *</label><input class="finput" id="f-name" placeholder="е§“еҗҚ" value="'+(c?c.name:'')+'"></div>'
    +'<div class="fgroup"><label class="flabel">дҝқйҡӘе…¬еҸё *</label><select class="fselect" id="f-company">'+coOpts+'</select></div>'
    +'<div class="fgroup"><label class="flabel">е•Ҷе“ҒеҗҚзЁұ *</label><select class="fselect" id="f-product">'+pOpts+'</select></div>'
    +'<div class="fgroup"><label class="flabel">е№ЈеҲҘ</label><select class="fselect" id="f-currency">'+curOpts+'</select></div>'

    +'<button class="btn-gold" onclick="saveClient(\''+(c?c.id:'')+'\''+')">'+(isEdit?'е„Іеӯҳи®Ҡжӣҙ':'ж–°еўһ')+'</button></div>';
  renderMTargets();
}

function switchMType(t){
  mType=t;
  var vals={n:document.getElementById('f-name')?document.getElementById('f-name').value:'',
    co:document.getElementById('f-company')?document.getElementById('f-company').value:'',
    pr:document.getElementById('f-product')?document.getElementById('f-product').value:'',
    cu:document.getElementById('f-currency')?document.getElementById('f-currency').value:'еҸ°е№Ј',
    sd:document.getElementById('f-signDate')?document.getElementById('f-signDate').value:''};
  mTargets=t==='monthly'?[{name:'',cashPct:'',unitPct:''}]:[{name:'',pct:''}];
  renderClientModal(null);
  if(document.getElementById('f-name'))document.getElementById('f-name').value=vals.n;
  if(document.getElementById('f-company'))document.getElementById('f-company').value=vals.co;
  if(document.getElementById('f-product'))document.getElementById('f-product').value=vals.pr;
  if(document.getElementById('f-currency'))document.getElementById('f-currency').value=vals.cu;
  if(document.getElementById('f-signDate'))document.getElementById('f-signDate').value=vals.sd;
}
window.switchMType=switchMType;

function addMTarget(){mTargets.push(mType==='monthly'?{name:'',cashPct:'',unitPct:''}:{name:'',pct:''});renderMTargets();}
function removeMTarget(i){mTargets.splice(i,1);if(!mTargets.length)mTargets.push(mType==='monthly'?{name:'',cashPct:'',unitPct:''}:{name:'',pct:''});renderMTargets();}
function updMT(i,f,v){mTargets[i][f]=v;renderMTargets();}
window.addMTarget=addMTarget;window.removeMTarget=removeMTarget;window.updMT=updMT;

function renderMTargets(){
  var ed=document.getElementById('targets-ed');if(!ed)return;
  var h='';
  mTargets.forEach(function(t,i){
    if(mType==='monthly'){
      var sum=(parseFloat(t.cashPct)||0)+(parseFloat(t.unitPct)||0);
      var sc=sum===100?'var(--green)':sum>100?'var(--red)':'var(--text-muted)';
      h+='<div style="background:var(--surface3);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px;">'

function saveClient(id){
  var name=(document.getElementById('f-name').value||'').trim();
  if(!name){alert('и«ӢеЎ«еҜ«е®ўжҲ¶е§“еҗҚ');return;}
  var data={name:name,company:document.getElementById('f-company').value,
    productName:document.getElementById('f-product').value,
    currency:document.getElementById('f-currency').value,
    signDate:document.getElementById('f-signDate').value,
    type:mType,targets:mTargets.filter(function(t){return t.name.trim();})};
  if(mType==='monthly'){
    var ep=document.getElementById('f-ep');
    if(!ep||!ep.value){alert('и«ӢеЎ«еҜ«йҖІе ҙжң¬йҮ‘');return;}
    data.entryPrincipal=parseFloat(ep.value);
  } else {
    var tp=document.getElementById('f-tp');
    if(!tp||!tp.value){alert('и«ӢеЎ«еҜ«зӣ®жЁҷдҝқиІ»');return;}
    data.targetPremium=parseFloat(tp.value);data.entryPrincipal=parseFloat(tp.value);
    var pf=document.getElementById('f-payFreq');data.payFreq=pf?pf.value:'жңҲз№і';
    var ps=document.getElementById('f-paused');data.isPaused=ps?ps.checked:false;
  }
  if(id){
    var idx=db.clients.findIndex(function(c){return c.id===id;});
    db.clients[idx]=Object.assign({},db.clients[idx],data);
  } else {
    db.clients.push(Object.assign({id:uid(),records:[]},data));
  }
  saveDB();closeModal();render();
}
window.saveClient=saveClient;

function deleteClient(id){
  if(!confirm('зўәе®ҡеҲӘйҷӨжӯӨе®ўжҲ¶еҸҠжүҖжңүзҙҖйҢ„пјҹ'))return;
  db.clients=db.clients.filter(function(c){return c.id!==id;});
  saveDB();render();
}

function saveRecord(recId,type,cid){
  var principal=document.getElementById('r-principal').value;
  if(!principal){alert('и«ӢеЎ«еҜ«еёійқўйҮ‘йЎҚ');return;}
  var isM=type==='monthly';
  var targets=rTargets.filter(function(t){return t.name.trim();});
  var data={reviewDate:document.getElementById('r-date').value,principal:parseFloat(principal),
    targets:targets,note:document.getElementById('r-note').value.trim()};
  if(isM){var ci=document.getElementById('r-ci');data.cumInterest=ci?parseFloat(ci.value)||0:0;}
  else{var cp=document.getElementById('r-cp');data.cumPaid=cp?parseFloat(cp.value)||0:0;}
  var c=db.clients.find(function(x){return x.id===cid;});
  if(!c.records)c.records=[];
  if(recId){var idx=c.records.findIndex(function(r){return r.id===recId;});c.records[idx]=Object.assign({},c.records[idx],data);}
  else{c.records.push(Object.assign({id:uid()},data));c.records.sort(function(a,b){return(a.reviewDate||'').localeCompare(b.reviewDate||'');});}
  saveDB();closeModal();renderDetail();
}
function deleteRecord(recId){
  if(!confirm('зўәе®ҡеҲӘйҷӨжӯӨзӯҶзҙҖйҢ„пјҹ'))return;
  var c=db.clients.find(function(x){return x.id===currentId;});
  c.records=c.records.filter(function(r){return r.id!==recId;});saveDB();renderDetail();
}
